<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextStory — Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&family=Literata:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:wght@600;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>

:root {
  --bg:       #0e0e10;
  --surface:  #16161a;
  --surface2: #1f1f25;
  --border:   #2a2a32;
  --accent:   #c8f06e;
  --accent2:  #a8d84e;
  --text:     #e8e8f0;
  --muted:    #6b6b80;
  --muted2:   #3a3a48;

  --paper:       #f4efe2;
  --paper-edge:  #e9e1cc;
  --paper-text:  #2b2620;
  --paper-muted: #948c76;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  line-height: 1.6;
}

/* ── NAVBAR ─────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 5%;
  height: 68px;
  position: sticky;
  top: 0;
  z-index: 300;
  background: rgba(14,14,16,.9);
  backdrop-filter: blur(18px);
  border-bottom: 1px solid var(--border);
  gap: 24px;
}

.logo { display:flex; align-items:center; gap:10px; text-decoration:none; flex-shrink:0; }
.logo-mark { width:32px; height:32px; background:var(--accent); border-radius:8px; display:grid; place-items:center; }
.logo-mark svg { width:16px; height:16px; }
.logo-name { font-family:'Syne', sans-serif; font-weight:800; font-size:1.15rem; color:var(--text); letter-spacing:-.02em; }

.back-link {
  display: flex; align-items: center; gap: 6px;
  color: var(--muted); text-decoration: none; font-size: .85rem; font-weight: 500;
  padding-left: 18px; border-left: 1px solid var(--border);
  transition: color .2s;
}
.back-link:hover { color: var(--text); }
.back-link svg { width: 15px; height: 15px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.header-center { flex:1; }

.save-status {
  display: flex; align-items: center; gap: 7px;
  font-size: .8rem; color: var(--muted); white-space: nowrap;
}
.save-dot { width:6px; height:6px; border-radius:50%; background: var(--muted2); transition: background .2s; }
.save-status.saving .save-dot { background: var(--accent); animation: pulse 1s infinite; }
.save-status.saved .save-dot { background: var(--accent); }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.35;} }

.nav-actions { display:flex; align-items:center; gap:10px; flex-shrink:0; }

.btn-ghost {
  background:none; border:1px solid var(--border); color:var(--text);
  padding:8px 18px; border-radius:8px; font-family:'DM Sans',sans-serif;
  font-size:.88rem; font-weight:500; cursor:pointer; transition: border-color .2s, color .2s;
}
.btn-ghost:hover { border-color: var(--muted); color:#fff; }

.btn-solid {
  background: var(--accent); border:none; color:#0e0e10;
  padding:8px 20px; border-radius:8px; font-family:'DM Sans',sans-serif;
  font-size:.88rem; font-weight:600; cursor:pointer; transition: background .2s;
}
.btn-solid:hover { background: var(--accent2); }
.btn-solid:disabled { background: var(--muted2); color: var(--muted); cursor: not-allowed; }

/* ── EDITOR SHELL ───────────────────────── */
/* Ajuste de columnas para que el editor sea más ancho */
.editor-shell {
  display: grid;
  grid-template-columns: 220px 1fr 280px;
  gap: 24px;
  max-width: 1600px;
  margin: 0 auto;
  padding: 36px 3% 80px;
  align-items: start;
}

.meta-block { margin-bottom: 24px; }

.title-input {
  width: 100%;
  background: none;
  border: none;
  outline: none;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 2rem;
  color: #fff;
  letter-spacing: -.02em;
  margin-bottom: 14px;
}
.title-input::placeholder { color: var(--muted2); }

.meta-row { display:flex; align-items:center; gap: 14px; flex-wrap: wrap; margin-bottom: 24px; }

.chapter-input {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .88rem;
  font-weight: 500;
  padding: 8px 14px;
  outline: none;
  min-width: 220px;
  transition: border-color .2s;
}
.chapter-input:focus { border-color: var(--accent); }
.chapter-input::placeholder { color: var(--muted); }

.genre-select {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  padding: 8px 12px;
  outline: none;
  cursor: pointer;
}

.status-pill {
  font-size: .72rem;
  font-weight: 600;
  letter-spacing: .05em;
  text-transform: uppercase;
  padding: 5px 12px;
  border-radius: 100px;
  border: 1px solid var(--border);
  color: var(--muted);
}

/* ── SECCIÓN PORTADA ────────────────────── */
.cover-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
}
.cover-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 12px;
  text-align: center;
}
.cover-upload {
  width: 100%;
  aspect-ratio: 2/3;
  border: 1px dashed var(--border);
  border-radius: 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px;
  cursor: pointer;
  transition: all .2s;
  background: rgba(0,0,0,.15);
  position: relative;
  overflow: hidden;
}
.cover-upload:hover {
  border-color: var(--accent);
  background: rgba(200,240,110,.05);
}
.cover-upload svg {
  width: 32px;
  height: 32px;
  color: var(--muted);
}
.cover-upload span {
  font-size: .78rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.4;
}
.cover-upload input {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  cursor: pointer;
}
.cover-preview {
  width: 100%;
  height: 100%;
  object-fit: cover;
  border-radius: 8px;
  display: none;
}

/* ── TOOLBAR ────────────────────────────── */
.toolbar {
  display: flex;
  align-items: center; gap: 4px;
  flex-wrap: wrap;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 8px;
  position: sticky;
  top: 84px;
  z-index: 50;
  margin-bottom: 22px;
}

.tb-group { display:flex; align-items:center; gap:3px; padding: 0 6px; }
.tb-divider { width:1px; height:22px; background: var(--border); margin: 0 2px; flex-shrink:0; }

.tb-btn {
  width: 34px; height: 34px;
  display: grid; place-items: center;
  background: none; border: none; border-radius: 7px;
  color: var(--text); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: background .15s, color .15s;
}
.tb-btn:hover { background: var(--surface2); }
.tb-btn.active { background: rgba(200,240,110,.14); color: var(--accent); }
.tb-btn svg { width: 17px; height: 17px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }

.tb-btn.glyph-b { font-weight: 700; font-size: .95rem; }
.tb-btn.glyph-i { font-style: italic; font-weight: 600; font-size: .95rem; }
.tb-btn.glyph-u { text-decoration: underline; font-weight: 600; font-size: .9rem; }
.tb-btn.glyph-s { text-decoration: line-through; font-weight: 600; font-size: .9rem; }

.tb-btn-text {
  height: 34px; padding: 0 12px;
  display: flex; align-items: center; gap: 6px;
  background: none; border: none; border-radius: 7px;
  color: var(--text); cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  font-size: .82rem; font-weight: 500;
  transition: background .15s, color .15s;
  white-space: nowrap;
}
.tb-btn-text:hover { background: var(--surface2); }
.tb-btn-text.active { background: rgba(200,240,110,.14); color: var(--accent); }

.tb-select {
  height: 34px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .8rem;
  padding: 0 10px;
  outline: none;
  cursor: pointer;
}
.tb-select:hover { border-color: var(--muted); }

/* ── THE PAGE ───────────────────────────── */
.desk {
  background: radial-gradient(ellipse 70% 50% at 50% 0%, rgba(255,255,255,.025) 0%, transparent 70%);
  border-radius: 18px;
  padding: 4px;
}

.manuscript-page {
  background: var(--paper);
  color: var(--paper-text);
  border-radius: 14px;
  padding: 72px 76px;
  min-height: 640px;
  box-shadow: 0 30px 70px rgba(0,0,0,.45), 0 1px 0 rgba(255,255,255,.04) inset;
  font-family: 'Literata', serif;
  font-size: 1.08rem;
  line-height: 1.85;
  outline: none;
  position: relative;
  width: 100%;
}

.manuscript-page::before {
  content: '';
  position: absolute;
  inset: 0;
  border: 1px solid var(--paper-edge);
  border-radius: 14px;
  pointer-events: none;
}

.manuscript-page:empty::before,
.manuscript-page.is-empty::after {
  content: attr(data-placeholder);
  color: var(--paper-muted);
  font-style: italic;
  position: absolute;
  top: 72px;
  left: 76px;
  pointer-events: none;
}

.manuscript-page::selection,
.manuscript-page *::selection { background: rgba(168, 216, 78, .45); }

.manuscript-page h1, .manuscript-page h2, .manuscript-page h3 {
  font-family: 'Playfair Display', serif;
  font-weight: 700;
  color: #1d1812;
  line-height: 1.25;
  margin: .6em 0 .4em;
}
.manuscript-page h1 { font-size: 1.9rem; }
.manuscript-page h2 { font-size: 1.5rem; }
.manuscript-page h3 { font-size: 1.2rem; }
.manuscript-page p { margin-bottom: .9em; }
.manuscript-page blockquote {
  border-left: 3px solid var(--accent2);
  padding-left: 18px;
  margin: 1em 0;
  color: #4a4536;
  font-style: italic;
}
.manuscript-page ul, .manuscript-page ol { padding-left: 28px; margin-bottom: .9em; }
.manuscript-page a { color: #5c7a2e; text-decoration: underline; }

.page-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 16px;
  padding: 0 6px;
  font-size: .78rem;
  color: var(--muted);
}
.page-footer .counts { display:flex; gap: 18px; }

/* ── ASIDE ──────────────────────────────── */
.aside-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 18px;
  margin-bottom: 18px;
}

.aside-title {
  font-family: 'Syne', sans-serif;
  font-weight: 700;
  font-size: .82rem;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 14px;
}

.chapter-list { display:flex; flex-direction:column; gap:6px; }

.chapter-item {
  display: flex; align-items: center; justify-content: space-between; gap: 8px;
  padding: 10px 12px;
  border-radius: 9px;
  background: none;
  border: 1px solid transparent;
  cursor: pointer;
  transition: background .15s, border-color .15s;
}
.chapter-item:hover { background: var(--surface2); }
.chapter-item.active { background: rgba(200,240,110,.08); border-color: rgba(200,240,110,.3); }

.chapter-info { display: flex; flex-direction: column; gap: 2px; }
.chapter-item-label { font-size: .85rem; color: var(--text); font-weight: 500; }
.chapter-item.active .chapter-item-label { color: var(--accent); }
.chapter-item-meta { font-size: .72rem; color: var(--muted); }

.chapter-actions { display: flex; gap: 6px; }
.btn-delete-chapter {
  width: 24px; height: 24px;
  border-radius: 6px;
  border: none;
  background: rgba(255,80,80,.15);
  color: #ff7070;
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 14px;
  font-weight: bold;
  transition: all .15s;
}
.btn-delete-chapter:hover {
  background: rgba(255,80,80,.3);
  color: #ffffff;
}

.add-chapter-btn {
  margin-top: 10px;
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  border-radius: 9px;
  color: var(--muted);
  padding: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  font-weight: 500;
  cursor: pointer;
  transition: border-color .2s, color .2s;
}
.add-chapter-btn:hover { border-color: var(--accent); color: var(--accent); }

.field-label {
  font-size: .78rem;
  color: var(--muted);
  margin-bottom: 6px;
  display: block;
}

.field-textarea {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 9px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: .85rem;
  padding: 10px 12px;
  outline: none;
  resize: vertical;
  min-height: 80px;
  margin-bottom: 14px;
  line-height: 1.6;
}
.field-textarea:focus { border-color: var(--accent); }

.stat-row { display:flex; justify-content:space-between; padding: 7px 0; border-bottom: 1px solid var(--border); font-size: .85rem; }
.stat-row:last-child { border-bottom: none; }
.stat-row span:first-child { color: var(--muted); }
.stat-row span:last-child { color: var(--text); font-weight: 600; }

/* ── TOAST ──────────────────────────────── */
.toast {
  position: fixed; bottom: 32px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2); border: 1px solid var(--border); color: var(--text);
  padding: 14px 24px; border-radius: 12px; font-size: .88rem; font-weight: 500;
  opacity: 0; transition: opacity .3s, transform .3s; z-index: 999;
  white-space: nowrap; box-shadow: 0 8px 32px rgba(0,0,0,.4); pointer-events: none;
}
.toast.toast-show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── RESPONSIVE ─────────────────────────── */
@media (max-width: 1200px) {
  .editor-shell { grid-template-columns: 200px 1fr 260px; gap: 20px; }
}
@media (max-width: 980px) {
  .editor-shell { grid-template-columns: 220px 1fr; }
  aside { grid-column: 1 / -1; }
}
@media (max-width: 768px) {
  .editor-shell { grid-template-columns: 1fr; }
  .header-center { display: none; }
  .manuscript-page { padding: 40px 26px; }
  .title-input { font-size: 1.5rem; }
  .toolbar { top: 0; }
}

</style>
</head>
<body>

<header>
  <a class="logo" href="{% url 'blog:home' %}">
    <div class="logo-mark">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect x="2" y="2" width="5" height="12" rx="1.5" fill="#0e0e10"/>
        <rect x="9" y="2" width="5" height="8" rx="1.5" fill="#0e0e10"/>
      </svg>
    </div>
    <span class="logo-name">NextStory</span>
  </a>
  <a class="back-link" href="{% url 'blog:home' %}">
    <svg viewBox="0 0 24 24"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
    Volver al inicio
  </a>

  <div class="header-center"></div>

  <div class="save-status saved" id="saveStatus">
    <span class="save-dot"></span>
    <span id="saveStatusText">Guardado</span>
  </div>

  <div class="nav-actions">
    <button type="button" class="btn-ghost" id="previewBtn">Vista previa</button>
    <button type="button" class="btn-solid" id="publishBtn">Publicar</button>
  </div>
</header>

<!-- Formulario -->
<form method="POST" action="{% url 'blog:guardar_libro' %}" id="formPublicar" enctype="multipart/form-data">
    {% csrf_token %}
    <input type="hidden" name="titulo" id="inputTitulo">
    <input type="hidden" name="sinopsis" id="inputSinopsis">
    <input type="hidden" name="contenido" id="inputContenido">
    <!-- Campo para la imagen de portada -->
    <input type="file" name="portada" id="inputPortada" accept="image/*" style="display: none;">

<div class="editor-shell">
  <!-- COLUMNA IZQUIERDA: PORTADA -->
  <div>
    <div class="cover-card">
      <h3 class="cover-title">Portada de la historia</h3>
      <label class="cover-upload" for="inputPortada">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <path d="M21 15l-5-5L5 21"/>
        </svg>
        <span>Haz clic para subir<br>imagen de portada</span>
        <img class="cover-preview" id="coverPreview" src="" alt="Vista previa portada">
      </label>
    </div>
  </div>

  <!-- COLUMNA CENTRAL: EDITOR (ahora más ancha) -->
  <div>
    <div class="meta-block">
      <input type="text" class="title-input" id="storyTitle" placeholder="Título de tu historia" maxlength="120">
      <div class="meta-row">
        <input type="text" class="chapter-input" id="chapterTitleInput" placeholder="Título del capítulo">
        <select class="genre-select" id="genreSelect">
          <option value="">Género</option>
          <option value="romance">Romance</option>
          <option value="fantasia">Fantasía</option>
          <option value="drama">Drama</option>
          <option value="misterio">Misterio</option>
          <option value="aventura">Aventura</option>
          <option value="ciencia_ficcion">Ciencia ficción</option>
          <option value="terror">Terror</option>
          <option value="thriller">Thriller</option>
          <option value="poesia">Poesía</option>
          <option value="historico">Histórico</option>
        </select>
        <span class="status-pill">Borrador</span>
      </div>
    </div>

    <!-- Barra de herramientas -->
    <div class="toolbar" id="toolbar">
      <div class="tb-group">
        <button type="button" class="tb-btn" data-action="undo" title="Deshacer">
          <svg viewBox="0 0 24 24"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>
        </button>
        <button type="button" class="tb-btn" data-action="redo" title="Rehacer">
          <svg viewBox="0 0 24 24"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>
        </button>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <select class="tb-select" id="blockSelect" title="Estilo de párrafo">
          <option value="P">Párrafo</option>
          <option value="H1">Título 1</option>
          <option value="H2">Título 2</option>
          <option value="H3">Título 3</option>
          <option value="BLOCKQUOTE">Cita</option>
        </select>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <select class="tb-select" id="fontSelect" title="Fuente">
          <option value="Literata">Literata</option>
          <option value="'Playfair Display'">Playfair Display</option>
          <option value="'Courier Prime'">Courier Prime</option>
          <option value="'DM Sans'">DM Sans</option>
        </select>
        <select class="tb-select" id="sizeSelect" title="Tamaño de letra">
          <option value="14px">14</option>
          <option value="16px">16</option>
          <option value="18px" selected>18</option>
          <option value="20px">20</option>
          <option value="24px">24</option>
          <option value="28px">28</option>
          <option value="32px">32</option>
        </select>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <button type="button" class="tb-btn glyph-b" data-action="bold" title="Negrita (Ctrl+B)">B</button>
        <button type="button" class="tb-btn glyph-i" data-action="italic" title="Cursiva (Ctrl+I)">I</button>
        <button type="button" class="tb-btn glyph-u" data-action="underline" title="Subrayado (Ctrl+U)">U</button>
        <button type="button" class="tb-btn glyph-s" data-action="strikeThrough" title="Tachado">S</button>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <button type="button" class="tb-btn" data-action="alignLeft" title="Alinear a la izquierda">
          <svg viewBox="0 0 24 24"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="17" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
        </button>
        <button type="button" class="tb-btn" data-action="alignCenter" title="Centrar">
          <svg viewBox="0 0 24 24"><line x1="18" y1="10" x2="6" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="18" y1="14" x2="6" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
        </button>
        <button type="button" class="tb-btn" data-action="alignRight" title="Alinear a la derecha">
          <svg viewBox="0 0 24 24"><line x1="21" y1="10" x2="7" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="7" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
        </button>
        <button type="button" class="tb-btn" data-action="alignJustify" title="Justificar">
          <svg viewBox="0 0 24 24"><line x1="21" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="21" y1="18" x2="3" y2="18"/></svg>
        </button>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <button type="button" class="tb-btn-text" data-action="insertUnorderedList" title="Lista con viñetas">• Lista</button>
        <button type="button" class="tb-btn-text" data-action="insertOrderedList" title="Lista numerada">1. Lista</button>
      </div>

      <div class="tb-divider"></div>

      <div class="tb-group">
        <button type="button" class="tb-btn-text" id="linkBtn" title="Insertar enlace">Enlace</button>
        <button type="button" class="tb-btn-text" id="clearFormatBtn" title="Borrar formato">Borrar formato</button>
      </div>
    </div>

    <div class="desk">
      <div class="manuscript-page"
           id="editor"
           contenteditable="true"
           data-placeholder="Había una vez..."
           spellcheck="true"></div>
    </div>

    <div class="page-footer">
      <div class="counts">
        <span id="wordCount">0 palabras</span>
        <span id="charCount">0 caracteres</span>
      </div>
      <span id="readTime">~0 min de lectura</span>
    </div>
  </div>

  <!-- COLUMNA DERECHA: CAPÍTULOS -->
  <aside>
    <div class="aside-card">
      <div class="aside-title">Capítulos</div>
      <div class="chapter-list" id="chapterList"></div>
      <button type="button" class="add-chapter-btn" id="addChapterBtn">+ Añadir capítulo</button>
    </div>

    <div class="aside-card">
      <div class="aside-title">Sinopsis</div>
      <label class="field-label" for="synopsis">Resumen breve para los lectores</label>
      <textarea class="field-textarea" id="synopsis" placeholder="En unas pocas líneas, ¿de qué trata tu historia?"></textarea>
    </div>

    <div class="aside-card">
      <div class="aside-title">Esta historia</div>
      <div class="stat-row"><span>Capítulos</span><span id="statChapters">1</span></div>
      <div class="stat-row"><span>Palabras totales</span><span id="statTotalWords">0</span></div>
      <div class="stat-row"><span>Última edición</span><span id="statLastEdit">ahora</span></div>
    </div>
  </aside>

</div>
</form>

<script>
let chapters = [
  { id: 1, title: 'Capítulo 1', html: '' }
];
let currentChapterId = 1;
let chapterCounter = 1;
let undoStack = [];
let redoStack = [];
const MAX_HISTORY = 50;

const editor = document.getElementById('editor');
const chapterTitleInput = document.getElementById('chapterTitleInput');
const chapterListEl = document.getElementById('chapterList');

// Vista previa de portada
const inputPortada = document.getElementById('inputPortada');
const coverPreview = document.getElementById('coverPreview');
inputPortada.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (file && file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = ev => {
      coverPreview.src = ev.target.result;
      coverPreview.style.display = 'block';
    };
    reader.readAsDataURL(file);
  }
});

function saveState() {
  const currentState = editor.innerHTML;
  if (undoStack.length === 0 || undoStack[undoStack.length - 1] !== currentState) {
    undoStack.push(currentState);
    if (undoStack.length > MAX_HISTORY) undoStack.shift();
    redoStack = [];
  }
}

function undo() {
  if (undoStack.length > 1) {
    redoStack.push(undoStack.pop());
    editor.innerHTML = undoStack[undoStack.length - 1];
    updateCounts();
    markSaving();
  }
}

function redo() {
  if (redoStack.length > 0) {
    undoStack.push(redoStack.pop());
    editor.innerHTML = undoStack[undoStack.length - 1];
    updateCounts();
    markSaving();
  }
}

function renderChapterList() {
  chapterListEl.innerHTML = '';
  chapters.forEach(ch => {
    const item = document.createElement('div');
    item.className = 'chapter-item' + (ch.id === currentChapterId ? ' active' : '');
    const words = plainTextWordCount(ch.html);
    item.innerHTML = `
      <div class="chapter-info">
        <span class="chapter-item-label">${escapeHtml(ch.title)}</span>
        <span class="chapter-item-meta">${words} palabras</span>
      </div>
      <div class="chapter-actions">
        <button type="button" class="btn-delete-chapter" title="Eliminar capítulo">×</button>
      </div>`;
    item.querySelector('.chapter-info').addEventListener('click', () => switchChapter(ch.id));
    item.querySelector('.btn-delete-chapter').addEventListener('click', (e) => {
      e.stopPropagation();
      deleteChapter(ch.id);
    });
    chapterListEl.appendChild(item);
  });
  document.getElementById('statChapters').textContent = chapters.length;
  const total = chapters.reduce((sum, c) => sum + plainTextWordCount(c.html), 0);
  document.getElementById('statTotalWords').textContent = total;
}

function escapeHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function plainTextWordCount(html) {
  const d = document.createElement('div');
  d.innerHTML = html || '';
  const text = (d.textContent || '').trim();
  return text ? text.split(/\s+/).length : 0;
}

function getCurrentChapter() {
  return chapters.find(c => c.id === currentChapterId);
}

function switchChapter(id) {
  const cur = getCurrentChapter();
  if (cur) cur.html = editor.innerHTML;

  currentChapterId = id;
  const next = getCurrentChapter();
  editor.innerHTML = next.html || '';
  saveState();
  chapterTitleInput.value = next.title;
  toggleEmptyState();
  updateCounts();
  renderChapterList();
}

function deleteChapter(id) {
  if (chapters.length <= 1) {
    showToast('No puedes borrar el único capítulo que existe');
    return;
  }
  if (!confirm('¿Seguro que quieres eliminar este capítulo? No se puede deshacer.')) return;

  chapters = chapters.filter(c => c.id !== id);
  if (currentChapterId === id) {
    switchChapter(chapters[0].id);
  } else {
    renderChapterList();
    markSaving();
  }
  showToast('Capítulo eliminado');
}

document.getElementById('addChapterBtn').addEventListener('click', (e) => {
  e.preventDefault();
  const cur = getCurrentChapter();
  if (cur) cur.html = editor.innerHTML;

  chapterCounter++;
  const newChapter = { id: Date.now(), title: 'Capítulo ' + chapterCounter, html: '' };
  chapters.push(newChapter);
  switchChapter(newChapter.id);
  markSaving();
});

chapterTitleInput.addEventListener('input', () => {
  const cur = getCurrentChapter();
  if (cur) cur.title = chapterTitleInput.value || cur.title;
  renderChapterList();
  markSaving();
});

function applyFormat(type, value = null) {
  editor.focus();
  const sel = window.getSelection();
  if (!sel.rangeCount) return;

  const range = sel.getRangeAt(0);
  const selectedText = range.toString();

  switch(type) {
    case 'bold':
      document.execCommand('bold', false, null);
      break;
    case 'italic':
      document.execCommand('italic', false, null);
      break;
    case 'underline':
      document.execCommand('underline', false, null);
      break;
    case 'strikeThrough':
      document.execCommand('strikeThrough', false, null);
      break;
    case 'alignLeft':
      document.execCommand('justifyLeft', false, null);
      break;
    case 'alignCenter':
      document.execCommand('justifyCenter', false, null);
      break;
    case 'alignRight':
      document.execCommand('justifyRight', false, null);
      break;
    case 'alignJustify':
      document.execCommand('justifyFull', false, null);
      break;
    case 'insertUnorderedList':
      document.execCommand('insertUnorderedList', false, null);
      break;
    case 'insertOrderedList':
      document.execCommand('insertOrderedList', false, null);
      break;
    case 'formatBlock':
      document.execCommand('formatBlock', false, value);
      break;
    case 'fontSize':
      if (selectedText) {
        const span = document.createElement('span');
        span.style.fontSize = value;
        range.surroundContents(span);
      }
      break;
    case 'fontName':
      if (selectedText) {
        const span = document.createElement('span');
        span.style.fontFamily = value;
        range.surroundContents(span);
      }
      break;
    case 'createLink':
      const url = prompt('Ingresa la URL:');
      if (url) document.execCommand('createLink', false, url);
      break;
    case 'removeFormat':
      document.execCommand('removeFormat', false, null);
      break;
  }

  saveState();
  updateToolbarState();
  markSaving();
}

document.querySelectorAll('.tb-btn[data-action], .tb-btn-text[data-action]').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.preventDefault();
    const action = btn.dataset.action;
    if (action === 'undo') undo();
    else if (action === 'redo') redo();
    else applyFormat(action);
  });
});

document.getElementById('blockSelect').addEventListener('change', (e) => {
  e.preventDefault();
  applyFormat('formatBlock', e.target.value);
});

document.getElementById('fontSelect').addEventListener('change', (e) => {
  e.preventDefault();
  applyFormat('fontName', e.target.value);
});

document.getElementById('sizeSelect').addEventListener('change', (e) => {
  e.preventDefault();
  applyFormat('fontSize', e.target.value);
});

document.getElementById('linkBtn').addEventListener('click', (e) => {
  e.preventDefault();
  applyFormat('createLink');
});

document.getElementById('clearFormatBtn').addEventListener('click', (e) => {
  e.preventDefault();
  applyFormat('removeFormat');
});

function updateToolbarState() {
  if (document.activeElement !== editor) return;
  const states = {
    bold: document.queryCommandState('bold'),
    italic: document.queryCommandState('italic'),
    underline: document.queryCommandState('underline'),
    strikeThrough: document.queryCommandState('strikeThrough'),
    alignLeft: document.queryCommandState('justifyLeft'),
    alignCenter: document.queryCommandState('justifyCenter'),
    alignRight: document.queryCommandState('justifyRight'),
    alignJustify: document.queryCommandState('justifyFull'),
    insertUnorderedList: document.queryCommandState('insertUnorderedList'),
    insertOrderedList: document.queryCommandState('insertOrderedList')
  };

  document.querySelectorAll('[data-action]').forEach(btn => {
    const action = btn.dataset.action;
    if (states.hasOwnProperty(action)) btn.classList.toggle('active', states[action]);
  });
}

document.addEventListener('selectionchange', () => {
  if (document.activeElement === editor) updateToolbarState();
});

function updateCounts() {
  const text = (editor.textContent || '').trim();
  const words = text ? text.split(/\s+/).length : 0;
  const chars = text.length;
  document.getElementById('wordCount').textContent = words + (words === 1 ? ' palabra' : ' palabras');
  document.getElementById('charCount').textContent = chars + ' caracteres';
  document.getElementById('readTime').textContent = '~' + Math.max(1, Math.round(words / 200)) + ' min de lectura';
}

function toggleEmptyState() {
  const isEmpty = !editor.textContent.trim() && editor.innerHTML.replace(/<br\s*\/?>/gi, '').trim() === '';
  editor.classList.toggle('is-empty', isEmpty);
}

let saveTimer = null;
function markSaving() {
  const statusEl = document.getElementById('saveStatus');
  const textEl = document.getElementById('saveStatusText');
  statusEl.classList.remove('saved');
  statusEl.classList.add('saving');
  textEl.textContent = 'Guardando...';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    getCurrentChapter().html = editor.innerHTML;
    statusEl.classList.remove('saving');
    statusEl.classList.add('saved');
    textEl.textContent = 'Guardado · hace un momento';
    document.getElementById('statLastEdit').textContent = 'hace un momento';
    renderChapterList();
  }, 900);
}

editor.addEventListener('input', () => {
  toggleEmptyState();
  updateCounts();
  saveState();
  markSaving();
});

document.getElementById('storyTitle').addEventListener('input', markSaving);
document.getElementById('genreSelect').addEventListener('change', markSaving);
document.getElementById('synopsis').addEventListener('input', markSaving);

document.getElementById('publishBtn').addEventListener('click', (e) => {
  e.preventDefault();
  const title = document.getElementById('storyTitle').value.trim();
  if (!title) {
    showToast('Dale un título a tu historia antes de publicar.');
    document.getElementById('storyTitle').focus();
    return;
  }

  const cur = getCurrentChapter();
  if (cur) cur.html = editor.innerHTML;

  let contenidoFinal = '';
  chapters.forEach((cap, index) => {
    if (cap.html.trim()) {
      contenidoFinal += `<h3>${cap.title}</h3>`;
      contenidoFinal += cap.html;
      contenidoFinal += '<hr>';
    }
  });

  document.getElementById('inputTitulo').value = document.getElementById('storyTitle').value;
  document.getElementById('inputSinopsis').value = document.getElementById('synopsis').value;
  document.getElementById('inputContenido').value = contenidoFinal;

  document.getElementById('formPublicar').submit();
});

document.getElementById('previewBtn').addEventListener('click', (e) => {
  e.preventDefault();
  showToast('Vista previa: así verán los lectores este capítulo.');
});

function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('toast-show'));
  setTimeout(() => { t.classList.remove('toast-show'); setTimeout(() => t.remove(), 400); }, 3000);
}

document.addEventListener('keydown', (e) => {
  if (document.activeElement === editor) {
    if ((e.ctrlKey || e.metaKey) && !e.shiftKey) {
      switch(e.key.toLowerCase()) {
        case 'b': e.preventDefault(); applyFormat('bold'); break;
        case 'i': e.preventDefault(); applyFormat('italic'); break;
        case 'u': e.preventDefault(); applyFormat('underline'); break;
        case 'z': e.preventDefault(); undo(); break;
        case 'y': e.preventDefault(); redo(); break;
      }
    } else if ((e.ctrlKey || e.metaKey) && e.shiftKey && e.key.toLowerCase() === 'z') {
      e.preventDefault(); redo();
    }
  }
});

chapterTitleInput.value = getCurrentChapter().title;
saveState();
toggleEmptyState();
updateCounts();
renderChapterList();
</script>
</body>
</html>
