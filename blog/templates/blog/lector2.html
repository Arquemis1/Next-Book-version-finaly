{# blog/templates/blog/lector2.html #}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ libro.titulo }} — {{ capitulo.data.title }} — NextStory</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300;1,9..40,400;1,9..40,500&display=swap" rel="stylesheet">
<script>
(function(){
    try{
        if(localStorage.getItem('nextstory-theme') === 'dark'){
            document.documentElement.classList.add('dark-pending');
        }
    }catch(e){}
})();
</script>
<style>
body{
    margin:0;
    background:#fafafa;
    font-family:'DM Sans',Helvetica,Arial,sans-serif;
    transition:background .2s ease;
}
html.dark-pending body{
    background:#0e0e10;
}
body.dark{
    background:#0e0e10;
}

.reader-container{
    max-width:980px;
    min-height:100vh;
    margin:auto;
    background:#ffffff;
    padding:0 88px 80px;
    transition:background .2s ease;
}
html.dark-pending .reader-container{
    background:#16161a;
}
body.dark .reader-container{
    background:#16161a;
}

.reader-topbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:26px 0;
    border-bottom:1px solid #ececec;
    margin-bottom:40px;
}
body.dark .reader-topbar{
    border-bottom-color:#2a2a32;
}
.back-link{
    display:inline-flex;
    align-items:center;
    gap:9px;
    color:#444;
    text-decoration:none;
    font-size:14px;
    font-weight:600;
    background:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    padding:0;
}
body.dark .back-link{
    color:#c8c8d0;
}
.back-link .icn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:34px;
    height:34px;
    border-radius:50%;
    background:#f3f3f3;
    font-size:16px;
    flex-shrink:0;
}
body.dark .back-link .icn{
    background:#23232b;
}
.theme-btn{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#f3f3f3;
    border:none;
    border-radius:10px;
    color:#444;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    padding:9px 16px;
    font-family:inherit;
}
.theme-btn:hover{
    background:#e7e7e7;
}
body.dark .theme-btn{
    background:#23232b;
    color:#e8e8f0;
}
body.dark .theme-btn:hover{
    background:#2c2c35;
}

.chapter-meta-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    margin-bottom:8px;
}
.chapter-pill{
    display:inline-flex;
    align-items:center;
    gap:8px;
    background:#f3f3f3;
    border-radius:100px;
    padding:7px 18px;
}
body.dark .chapter-pill{
    background:#23232b;
}
.chapter-pill span{
    font-size:13px;
    font-weight:700;
    letter-spacing:.04em;
    color:#555;
}
body.dark .chapter-pill span{
    color:#c8c8d0;
}
.progress-segments{
    display:flex;
    gap:6px;
}
.progress-segments span{
    width:30px;
    height:7px;
    border-radius:4px;
    background:#e5e5e5;
}
.progress-segments span.filled{
    background:#111;
}
body.dark .progress-segments span{
    background:#2c2c35;
}
body.dark .progress-segments span.filled{
    background:#c8f06e;
}

.chapter-title{
    margin-top:22px;
    margin-bottom:48px;
    padding-bottom:32px;
    border-bottom:1px solid #ececec;
}
body.dark .chapter-title{
    border-bottom-color:#2a2a32;
}
.chapter-title h1{
    margin:0;
    font-size:2.5rem;
    font-weight:700;
    color:#111;
    font-family:'DM Sans',Helvetica,Arial,sans-serif;
    line-height:1.15;
    letter-spacing:-.02em;
}
body.dark .chapter-title h1{
    color:#f3f4f6;
}

.reader-content{
    font-size:1.08rem;
    line-height:1.95;
    color:#222;
    font-family:'DM Sans',Helvetica,Arial,sans-serif;
    font-weight:300;
    transition:font-size .15s ease, color .2s ease;
}
body.dark .reader-content{
    color:#e5e7eb;
}
.reader-content p{
    margin:0 0 1.5rem 0;
}
.reader-content p:last-child{
    margin-bottom:0;
}

@media(max-width:700px){
    .reader-container{padding:0 24px 48px;}
    .chapter-title h1{font-size:1.7rem;}
}

.chapter-block{
    margin-bottom:0;
}
.chapter-divider{
    display:flex;
    align-items:center;
    gap:16px;
    margin:64px 0 40px;
}
.chapter-divider::before,
.chapter-divider::after{
    content:'';
    flex:1;
    height:1px;
    background:#ececec;
}
body.dark .chapter-divider::before,
body.dark .chapter-divider::after{
    background:#2a2a32;
}
.chapter-divider span{
    font-size:12px;
    font-weight:700;
    letter-spacing:.08em;
    color:#b0b0b0;
    text-transform:uppercase;
    flex-shrink:0;
}
body.dark .chapter-divider span{
    color:#54545f;
}

.end-of-book{
    text-align:center;
    padding:56px 0 8px;
    color:#999;
    font-size:14px;
    font-weight:500;
}
body.dark .end-of-book{
    color:#6b6b80;
}

.loading-next{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding:48px 0;
    color:#999;
    font-size:14px;
    font-weight:500;
}
body.dark .loading-next{
    color:#6b6b80;
}
.spinner{
    width:16px;
    height:16px;
    border-radius:50%;
    border:2px solid #e5e5e5;
    border-top-color:#999;
    animation:spin .7s linear infinite;
}
body.dark .spinner{
    border-color:#2c2c35;
    border-top-color:#6b6b80;
}
@keyframes spin{ to{ transform:rotate(360deg); } }
</style>
</head>
<body>

<div class="reader-container">

    <div class="reader-topbar">
        <a class="back-link" href="{% url 'blog:perfil_libro' libro.id_libro %}">
            <span class="icn">←</span>
            Biblioteca
        </a>
        <button class="theme-btn" id="themeToggle" aria-label="Cambiar a modo oscuro">
            <span id="themeIcon">☼</span>
            <span id="themeLabel">Modo oscuro</span>
        </button>
    </div>

    <div id="chaptersFeed">
        {% include 'blog/lector_fragmento.html' %}
    </div>

    <div id="loadSentinel"></div>

</div>

<script>
(function(){
    var themeBtn = document.getElementById('themeToggle');
    var themeIcon = document.getElementById('themeIcon');
    var themeLabel = document.getElementById('themeLabel');

    function applyTheme(isDark){
        document.body.classList.toggle('dark', isDark);
        document.documentElement.classList.remove('dark-pending');
        themeLabel.textContent = isDark ? 'Modo claro' : 'Modo oscuro';
        themeIcon.textContent = isDark ? '☾' : '☼';
        themeBtn.setAttribute('aria-label', isDark ? 'Cambiar a modo claro' : 'Cambiar a modo oscuro');
    }

    var saved = null;
    try{ saved = localStorage.getItem('nextstory-theme'); }catch(e){}
    applyTheme(saved === 'dark');

    themeBtn.addEventListener('click', function(){
        var isDark = !document.body.classList.contains('dark');
        applyTheme(isDark);
        try{ localStorage.setItem('nextstory-theme', isDark ? 'dark' : 'light'); }catch(e){}
    });
})();

/* ── LECTURA CONTINUA (scroll infinito entre capítulos) ── */
(function(){
    var READER_BASE_URL = "{% url 'blog:leer_capitulo' libro.id_libro %}";

    var feed = document.getElementById('chaptersFeed');
    var sentinel = document.getElementById('loadSentinel');

    var loading = false;
    var finished = false;

    function lastBlock(){
        var blocks = feed.querySelectorAll('.chapter-block');
        return blocks[blocks.length - 1];
    }

    function currentState(){
        var b = lastBlock();
        return {
            indice: parseInt(b.dataset.indice, 10),
            total: parseInt(b.dataset.total, 10)
        };
    }

    function showLoader(){
        var l = document.createElement('div');
        l.className = 'loading-next';
        l.id = 'loadingIndicator';
        l.innerHTML = '<span class="spinner"></span><span>Cargando siguiente capítulo…</span>';
        feed.appendChild(l);
    }

    function removeLoader(){
        var l = document.getElementById('loadingIndicator');
        if(l) l.remove();
    }

    function showEnd(){
        var e = document.createElement('div');
        e.className = 'end-of-book';
        e.textContent = 'Has llegado al final de la historia.';
        feed.appendChild(e);
    }

    function appendDivider(indice, total){
        var d = document.createElement('div');
        d.className = 'chapter-divider';
        d.innerHTML = '<span>Capítulo ' + indice + ' de ' + total + '</span>';
        feed.appendChild(d);
    }

    function loadNextChapter(){
        if(loading || finished) return;
        var state = currentState();
        if(state.indice >= state.total){
            finished = true;
            showEnd();
            observer.unobserve(sentinel);
            return;
        }

        loading = true;
        showLoader();

        var nextIndex = state.indice + 1;
        var url = READER_BASE_URL + '?cap=' + nextIndex + '&fragment=1';

        fetch(url, { headers: { 'X-Requested-With': 'fetch' } })
            .then(function(res){
                if(!res.ok) throw new Error('No se pudo cargar el capítulo ' + nextIndex);
                return res.text();
            })
            .then(function(html){
                var parser = new DOMParser();
                var doc = parser.parseFromString(html, 'text/html');
                var nextBlock = doc.querySelector('.chapter-block');
                if(!nextBlock) throw new Error('Capítulo no encontrado en la respuesta');

                removeLoader();
                appendDivider(nextIndex, state.total);
                feed.appendChild(nextBlock);

                var newUrl = READER_BASE_URL + '?cap=' + nextIndex;
                history.pushState({cap: nextIndex}, '', newUrl);
                var newTitleEl = nextBlock.querySelector('.chapter-title h1');
                if(newTitleEl) document.title = document.title.replace(/—.*—/, '— ' + newTitleEl.textContent + ' —');

                loading = false;

                if(nextIndex >= state.total){
                    finished = true;
                    showEnd();
                    observer.unobserve(sentinel);
                }
            })
            .catch(function(err){
                removeLoader();
                loading = false;
                console.error(err);
            });
    }

    var observer = new IntersectionObserver(function(entries){
        entries.forEach(function(entry){
            if(entry.isIntersecting) loadNextChapter();
        });
    }, { rootMargin: '600px 0px 0px 0px' });

    observer.observe(sentinel);
})();
</script>

</body>
</html>
